trigger:
  branches:
    include:
      - main
      - feature/*

pool:
  name: 'mac-local'

stages:

# ============================================================
# STAGE 1: Build & Test
# ============================================================
- stage: Build
  displayName: 'Build and Test'
  jobs:
  - job: RunTests
    displayName: 'Install Dependencies and Test'
    steps:

    - task: UsePythonVersion@0
      inputs:
        versionSpec: '3.12'
      displayName: 'Use Python 3.12'

    - script: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov
      displayName: 'Install dependencies'

    - script: |
        python -c "from app.main import app; print('App imports OK')"
      displayName: 'Smoke test: app imports'

    - script: |
        pytest tests/ --tb=short -v
      displayName: 'Run unit tests'

# ============================================================
# STAGE 2: Deploy to DEV
# ============================================================
- stage: DeployDev
  displayName: 'Deploy to DEV'
  dependsOn: Build
  condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
  jobs:
  - deployment: DeployToDev
    displayName: 'Deploy to Dev App Service'
    environment: 'weather-api-dev'
    strategy:
      runOnce:
        deploy:
          steps:
          - task: AzureWebApp@1
            inputs:
              azureSubscription: 'Azure-Service-Connection'
              appType: 'webAppLinux'
              appName: 'weather-api-jm1535'
              package: '$(System.DefaultWorkingDirectory)'
              startUpCommand: 'bash startup.sh'

# ============================================================
# STAGE 3: Deploy to UAT
# ============================================================
- stage: DeployUAT
  displayName: 'Deploy to UAT'
  dependsOn: DeployDev
  condition: succeeded()
  jobs:
  - deployment: DeployToUAT
    displayName: 'Deploy to UAT App Service'
    environment: 'weather-api-uat'
    strategy:
      runOnce:
        deploy:
          steps:
          - task: AzureWebApp@1
            inputs:
              azureSubscription: 'Azure-Service-Connection'
              appType: 'webAppLinux'
              appName: 'weather-api-jm1535'
              package: '$(System.DefaultWorkingDirectory)'
              startUpCommand: 'bash startup.sh'

# ============================================================
# STAGE 4: Deploy to PROD (manual approval required)
# ============================================================
- stage: DeployProd
  displayName: 'Deploy to PROD'
  dependsOn: DeployUAT
  condition: succeeded()
  jobs:
  - deployment: DeployToProd
    displayName: 'Deploy to Production App Service'
    environment: 'weather-api-prod'
    strategy:
      runOnce:
        deploy:
          steps:
          - task: AzureWebApp@1
            inputs:
              azureSubscription: 'Azure-Service-Connection'
              appType: 'webAppLinux'
              appName: 'weather-api-jm1535'
              package: '$(System.DefaultWorkingDirectory)'
              startUpCommand: 'bash startup.sh'
