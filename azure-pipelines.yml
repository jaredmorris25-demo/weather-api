trigger:
  branches:
    include:
      - main
      - feature/*

pool:
  name: 'mac-local'


stages:

# ============================================================
# STAGE 1: Build & Test
# ============================================================
- stage: Build
  displayName: 'Build and Test'
  jobs:
  - job: RunTests
    displayName: 'Install Dependencies and Test'
    steps:

    - script: |
        /usr/bin/python3 --version
        /usr/bin/python3 -m pip install --user --upgrade pip
        /usr/bin/python3 -m pip install --user -r requirements.txt
        /usr/bin/python3 -m pip install --user pytest
        echo "--- Testing Import ---"
        /usr/bin/python3 -c "from app.main import app; print('App imports OK')"
        echo "--- Cross-compiling for x86_64 Azure deployment ---"
        /usr/bin/python3 -m venv antenv
        antenv/bin/pip install --upgrade pip
        antenv/bin/pip install \
          --platform manylinux2014_x86_64 \
          --target antenv/lib/python3.10/site-packages \
          --only-binary=:all: \
          --python-version 3.10 \
          -r requirements.txt
      displayName: 'Install and Test'
      env:
        OPENWEATHER_API_KEY: 'test-dummy-key'
        OPENWEATHER_BASE_URL: 'http://test-dummy-url'
        APP_ENV: 'dev'

    - script: |
        cd $(System.DefaultWorkingDirectory)
        zip -r $(Build.ArtifactStagingDirectory)/app.zip . \
          -x "*.git*" \
          -x "__pycache__/*" \
          -x "*.pyc" \
          -x "*.db" \
          -x "*.log"
        echo "--- Zip contents (top level) ---"
        unzip -l $(Build.ArtifactStagingDirectory)/app.zip | head -30
      displayName: 'Package app'

    - task: PublishBuildArtifacts@1
      inputs:
        PathtoPublish: '$(Build.ArtifactStagingDirectory)'
        ArtifactName: 'drop'
      displayName: 'Publish artifact'

# ============================================================
# STAGE 2: Deploy to DEV
# ============================================================
- stage: DeployDev
  displayName: 'Deploy to DEV'
  dependsOn: Build
  condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
  jobs:
  - deployment: DeployToDev
    displayName: 'Deploy to Dev App Service'
    environment: 'weather-api-dev'
    strategy:
      runOnce:
        deploy:
          steps:
          - task: DownloadBuildArtifacts@1
            inputs:
              buildType: 'current'
              downloadType: 'single'
              artifactName: 'drop'
              downloadPath: '$(System.ArtifactsDirectory)'
            displayName: 'Download artifact'

          - task: AzureWebApp@1
            inputs:
              azureSubscription: 'Azure-Service-Connection'
              appType: 'webAppLinux'
              appName: 'weather-api-jm1535'
              package: '$(System.ArtifactsDirectory)/drop/app.zip'
              startUpCommand: 'gunicorn -w 4 -k uvicorn.workers.UvicornWorker app.main:app --bind 0.0.0.0:8000'

          - script: |
              echo "Waiting for app to start..."
              sleep 60
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://weather-api-jm1535.azurewebsites.net/health)
              echo "Health check status: $STATUS"
              if [ "$STATUS" != "200" ]; then
                echo "##[error]Health check failed with status $STATUS"
                exit 1
              fi
              echo "Health check passed"
            displayName: 'Health check'

# ============================================================
# STAGE 3: Deploy to UAT
# ============================================================
- stage: DeployUAT
  displayName: 'Deploy to UAT'
  dependsOn: DeployDev
  condition: succeeded()
  jobs:
  - deployment: DeployToUAT
    displayName: 'Deploy to UAT App Service'
    environment: 'weather-api-uat'
    strategy:
      runOnce:
        deploy:
          steps:
          - task: DownloadBuildArtifacts@1
            inputs:
              buildType: 'current'
              downloadType: 'single'
              artifactName: 'drop'
              downloadPath: '$(System.ArtifactsDirectory)'
            displayName: 'Download artifact'

          - task: AzureWebApp@1
            inputs:
              azureSubscription: 'Azure-Service-Connection'
              appType: 'webAppLinux'
              appName: 'weather-api-jm1535'
              package: '$(System.ArtifactsDirectory)/drop/app.zip'
              startUpCommand: 'gunicorn -w 4 -k uvicorn.workers.UvicornWorker app.main:app --bind 0.0.0.0:8000'

          - script: |
              echo "Waiting for app to start..."
              sleep 60
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://weather-api-jm1535.azurewebsites.net/health)
              echo "Health check status: $STATUS"
              if [ "$STATUS" != "200" ]; then
                echo "##[error]Health check failed with status $STATUS"
                exit 1
              fi
              echo "Health check passed"
            displayName: 'Health check'

# ============================================================
# STAGE 4: Deploy to PROD (manual approval required)
# ============================================================
- stage: DeployProd
  displayName: 'Deploy to PROD'
  dependsOn: DeployUAT
  condition: succeeded()
  jobs:
  - deployment: DeployToProd
    displayName: 'Deploy to Production App Service'
    environment: 'weather-api-prod'
    strategy:
      runOnce:
        deploy:
          steps:
          - task: DownloadBuildArtifacts@1
            inputs:
              buildType: 'current'
              downloadType: 'single'
              artifactName: 'drop'
              downloadPath: '$(System.ArtifactsDirectory)'
            displayName: 'Download artifact'

          - task: AzureWebApp@1
            inputs:
              azureSubscription: 'Azure-Service-Connection'
              appType: 'webAppLinux'
              appName: 'weather-api-jm1535'
              package: '$(System.ArtifactsDirectory)/drop/app.zip'
              startUpCommand: 'gunicorn -w 4 -k uvicorn.workers.UvicornWorker app.main:app --bind 0.0.0.0:8000'

          - script: |
              echo "Waiting for app to start..."
              sleep 60
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://weather-api-jm1535.azurewebsites.net/health)
              echo "Health check status: $STATUS"
              if [ "$STATUS" != "200" ]; then
                echo "##[error]Health check failed with status $STATUS"
                exit 1
              fi
              echo "Health check passed"
            displayName: 'Health check'