trigger:
  branches:
    include:
      - main
      - feature/*

pool:
  name: 'mac-local'

stages:

# ============================================================
# STAGE 1: Build & Test
# ============================================================
- stage: Build
  displayName: 'Build and Test'
  jobs:
  - job: RunTests
    displayName: 'Install Dependencies and Test'
    steps:

    - script: |
        /usr/bin/python3 --version
        /usr/bin/python3 -m pip install --user --upgrade pip
        /usr/bin/python3 -m pip install --user -r requirements.txt
        /usr/bin/python3 -m pip install --user pytest pytest-cov
        echo "--- Installed Packages ---"
        /usr/bin/python3 -m pip list
        echo "--- Testing Import ---"
        /usr/bin/python3 -c "from app.main import app; print('App imports OK')"
        echo "--- Running Tests ---"
        /usr/bin/python3 -m pytest tests/ --tb=short -v
      displayName: 'Install and Test'
      env:
        OPENWEATHER_API_KEY: 'test-dummy-key'
        OPENWEATHER_BASE_URL: 'http://test-dummy-url'
        APP_ENV: 'dev'

    - script: |
        cd $(System.DefaultWorkingDirectory)
        tar -czf $(Build.ArtifactStagingDirectory)/app.tar.gz \
          --exclude='.git' \
          --exclude='__pycache__' \
          --exclude='*.pyc' \
          --exclude='*.db' \
          --exclude='*.log' \
          .
      displayName: 'Package app'

    - task: PublishBuildArtifacts@1
      inputs:
        PathtoPublish: '$(Build.ArtifactStagingDirectory)'
        ArtifactName: 'drop'
      displayName: 'Publish artifact'

# ============================================================
# STAGE 2: Deploy to DEV
# ============================================================
- stage: DeployDev
  displayName: 'Deploy to DEV'
  dependsOn: Build
  condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
  jobs:
  - deployment: DeployToDev
    displayName: 'Deploy to Dev App Service'
    environment: 'weather-api-dev'
    strategy:
      runOnce:
        deploy:
          steps:
          - task: DownloadBuildArtifacts@1
            inputs:
              buildType: 'current'
              downloadType: 'single'
              artifactName: 'drop'
              downloadPath: '$(System.ArtifactsDirectory)'
            displayName: 'Download artifact'

          - task: AzureWebApp@1
            inputs:
              azureSubscription: 'Azure-Service-Connection'
              appType: 'webAppLinux'
              appName: 'weather-api-jm1535'
              package: '$(System.ArtifactsDirectory)/drop/app.tar.gz'
              startUpCommand: 'gunicorn -w 4 -k uvicorn.workers.UvicornWorker app.main:app --bind 0.0.0.0:8000'

# ============================================================
# STAGE 3: Deploy to UAT
# ============================================================
- stage: DeployUAT
  displayName: 'Deploy to UAT'
  dependsOn: DeployDev
  condition: succeeded()
  jobs:
  - deployment: DeployToUAT
    displayName: 'Deploy to UAT App Service'
    environment: 'weather-api-uat'
    strategy:
      runOnce:
        deploy:
          steps:
          - task: DownloadBuildArtifacts@1
            inputs:
              buildType: 'current'
              downloadType: 'single'
              artifactName: 'drop'
              downloadPath: '$(System.ArtifactsDirectory)'
            displayName: 'Download artifact'

          - task: AzureWebApp@1
            inputs:
              azureSubscription: 'Azure-Service-Connection'
              appType: 'webAppLinux'
              appName: 'weather-api-jm1535'
              package: '$(System.ArtifactsDirectory)/drop/app.tar.gz'
              startUpCommand: 'gunicorn -w 4 -k uvicorn.workers.UvicornWorker app.main:app --bind 0.0.0.0:8000'

# ============================================================
# STAGE 4: Deploy to PROD (manual approval required)
# ============================================================
- stage: DeployProd
  displayName: 'Deploy to PROD'
  dependsOn: DeployUAT
  condition: succeeded()
  jobs:
  - deployment: DeployToProd
    displayName: 'Deploy to Production App Service'
    environment: 'weather-api-prod'
    strategy:
      runOnce:
        deploy:
          steps:
          - task: DownloadBuildArtifacts@1
            inputs:
              buildType: 'current'
              downloadType: 'single'
              artifactName: 'drop'
              downloadPath: '$(System.ArtifactsDirectory)'
            displayName: 'Download artifact'

          - task: AzureWebApp@1
            inputs:
              azureSubscription: 'Azure-Service-Connection'
              appType: 'webAppLinux'
              appName: 'weather-api-jm1535'
              package: '$(System.ArtifactsDirectory)/drop/app.tar.gz'
              startUpCommand: 'gunicorn -w 4 -k uvicorn.workers.UvicornWorker app.main:app --bind 0.0.0.0:8000'