trigger:
  branches:
    include:
      - main
      - feature/*

pool:
  name: 'mac-local'

stages:

# ============================================================
# STAGE 1: Build & Test
# ============================================================
- stage: Build
  displayName: 'Build and Test'
  jobs:
  - job: RunTests
    displayName: 'Install Dependencies and Test'
    steps:

    - script: |
        /usr/bin/python3 --version
        /usr/bin/python3 -m pip install --upgrade pip
        /usr/bin/python3 -m pip install -r requirements.txt
        /usr/bin/python3 -m pip install pytest pytest-cov
        echo "--- Installed Packages ---"
        /usr/bin/python3 -m pip list
        echo "--- Testing Import ---"
        usr/bin/python3 -c "from app.main import app; print('App imports OK')"
        echo "--- Running Tests ---"
        usr/bin/python3 -m pytest tests/ --tb=short -v
      displayName: 'Install and Test'

# ============================================================
# STAGE 2: Deploy to DEV
# ============================================================
- stage: DeployDev
  displayName: 'Deploy to DEV'
  dependsOn: Build
  condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
  jobs:
  - deployment: DeployToDev
    displayName: 'Deploy to Dev App Service'
    environment: 'weather-api-dev'
    strategy:
      runOnce:
        deploy:
          steps:
          - task: AzureWebApp@1
            inputs:
              azureSubscription: 'Azure-Service-Connection'
              appType: 'webAppLinux'
              appName: 'weather-api-jm1535'
              package: '$(System.DefaultWorkingDirectory)'
              startUpCommand: 'bash startup.sh'

# ============================================================
# STAGE 3: Deploy to UAT
# ============================================================
- stage: DeployUAT
  displayName: 'Deploy to UAT'
  dependsOn: DeployDev
  condition: succeeded()
  jobs:
  - deployment: DeployToUAT
    displayName: 'Deploy to UAT App Service'
    environment: 'weather-api-uat'
    strategy:
      runOnce:
        deploy:
          steps:
          - task: AzureWebApp@1
            inputs:
              azureSubscription: 'Azure-Service-Connection'
              appType: 'webAppLinux'
              appName: 'weather-api-jm1535'
              package: '$(System.DefaultWorkingDirectory)'
              startUpCommand: 'bash startup.sh'

# ============================================================
# STAGE 4: Deploy to PROD (manual approval required)
# ============================================================
- stage: DeployProd
  displayName: 'Deploy to PROD'
  dependsOn: DeployUAT
  condition: succeeded()
  jobs:
  - deployment: DeployToProd
    displayName: 'Deploy to Production App Service'
    environment: 'weather-api-prod'
    strategy:
      runOnce:
        deploy:
          steps:
          - task: AzureWebApp@1
            inputs:
              azureSubscription: 'Azure-Service-Connection'
              appType: 'webAppLinux'
              appName: 'weather-api-jm1535'
              package: '$(System.DefaultWorkingDirectory)'
              startUpCommand: 'bash startup.sh'
