trigger:
  branches:
    include:
      - main
      - feature/*

pool:
  name: 'mac-local'

stages:

# ============================================================
# STAGE 1: Build & Test
# ============================================================
- stage: Build
  displayName: 'Build and Test'
  jobs:
  - job: RunTests
    displayName: 'Install Dependencies and Test'
    steps:

    - script: |
        rm -rf antenv
        /usr/bin/python3 -m venv antenv
        antenv/bin/pip install --upgrade pip
        echo "--- Installing requirements ---"
        antenv/bin/pip install --no-cache-dir -r requirements.txt
        echo "--- Checking sqlalchemy specifically ---"
        antenv/bin/pip show sqlalchemy
        antenv/bin/pip install --no-cache-dir pytest pytest-cov
        echo "--- Running Tests ---"
        antenv/bin/python -m pytest tests/ --tb=short -v
      displayName: 'Install and Test'
      env:
        OPENWEATHER_API_KEY: 'test-dummy-key'
        OPENWEATHER_BASE_URL: 'http://test-dummy-url'
        APP_ENV: 'dev'

    - script: |
        zip -r $(Build.ArtifactStagingDirectory)/app.zip . -x "*.git*" -x "__pycache__/*" -x "*.pyc" -x "*.db" -x "*.log"
      displayName: 'Zip package with venv'

    - task: PublishBuildArtifacts@1
      inputs:
        PathtoPublish: '$(Build.ArtifactStagingDirectory)'
        ArtifactName: 'drop'
      displayName: 'Publish artifact'

# ============================================================
# STAGE 2: Deploy to DEV
# ============================================================
- stage: DeployDev
  displayName: 'Deploy to DEV'
  dependsOn: Build
  condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
  jobs:
  - deployment: DeployToDev
    displayName: 'Deploy to Dev App Service'
    environment: 'weather-api-dev'
    strategy:
      runOnce:
        deploy:
          steps:
          - task: DownloadBuildArtifacts@1
            inputs:
              buildType: 'current'
              downloadType: 'single'
              artifactName: 'drop'
              downloadPath: '$(System.ArtifactsDirectory)'
            displayName: 'Download artifact'

          - task: AzureWebApp@1
            inputs:
              azureSubscription: 'Azure-Service-Connection'
              appType: 'webAppLinux'
              appName: 'weather-api-jm1535'
              package: '$(System.ArtifactsDirectory)/drop/app.zip'
              startUpCommand: 'gunicorn -w 4 -k uvicorn.workers.UvicornWorker app.main:app --bind 0.0.0.0:8000'

# ============================================================
# STAGE 3: Deploy to UAT
# ============================================================
- stage: DeployUAT
  displayName: 'Deploy to UAT'
  dependsOn: DeployDev
  condition: succeeded()
  jobs:
  - deployment: DeployToUAT
    displayName: 'Deploy to UAT App Service'
    environment: 'weather-api-uat'
    strategy:
      runOnce:
        deploy:
          steps:
          - task: DownloadBuildArtifacts@1
            inputs:
              buildType: 'current'
              downloadType: 'single'
              artifactName: 'drop'
              downloadPath: '$(System.ArtifactsDirectory)'
            displayName: 'Download artifact'

          - task: AzureWebApp@1
            inputs:
              azureSubscription: 'Azure-Service-Connection'
              appType: 'webAppLinux'
              appName: 'weather-api-jm1535'
              package: '$(System.ArtifactsDirectory)/drop/app.zip'
              startUpCommand: 'gunicorn -w 4 -k uvicorn.workers.UvicornWorker app.main:app --bind 0.0.0.0:8000'

# ============================================================
# STAGE 4: Deploy to PROD (manual approval required)
# ============================================================
- stage: DeployProd
  displayName: 'Deploy to PROD'
  dependsOn: DeployUAT
  condition: succeeded()
  jobs:
  - deployment: DeployToProd
    displayName: 'Deploy to Production App Service'
    environment: 'weather-api-prod'
    strategy:
      runOnce:
        deploy:
          steps:
          - task: DownloadBuildArtifacts@1
            inputs:
              buildType: 'current'
              downloadType: 'single'
              artifactName: 'drop'
              downloadPath: '$(System.ArtifactsDirectory)'
            displayName: 'Download artifact'

          - task: AzureWebApp@1
            inputs:
              azureSubscription: 'Azure-Service-Connection'
              appType: 'webAppLinux'
              appName: 'weather-api-jm1535'
              package: '$(System.ArtifactsDirectory)/drop/app.zip'
              startUpCommand: 'gunicorn -w 4 -k uvicorn.workers.UvicornWorker app.main:app --bind 0.0.0.0:8000'
